<!-- Efectos premium inyectados sobre el documento padre (same-origin).
     Theming: lee SOLO las CSS vars del padre; MutationObserver re-aplica
     al cambiar el tema. Degradable: cada bloque va en try/catch. -->
<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function () {
  const P = window.parent;
  const PD = P.document;
  if (P.__wcEffects) return;          // idempotente entre reruns
  P.__wcEffects = true;

  const cssVar = (name, fb) => {
    // el <style> :root más reciente manda (computedStyle puede quedar viejo)
    const styles = PD.querySelectorAll('style');
    for (let i = styles.length - 1; i >= 0; i--) {
      const t = styles[i].textContent;
      if (t.includes(':root') && t.includes('--bg:')) {
        const m = t.match(new RegExp(name.slice(2) === name ? name :
          '--' + name.slice(2) + '\\s*:\\s*([^;}]+)'));
        if (m) return m[1].trim();
        break;
      }
    }
    const v = getComputedStyle(PD.documentElement).getPropertyValue(name).trim();
    return v || fb;
  };

  /* ---------- 1. Lenis: scroll buttery-smooth en el contenedor real ---- */
  try {
    const wrapper = PD.querySelector('section[data-testid="stMain"]');
    if (window.Lenis && wrapper) {
      const lenis = new Lenis({
        wrapper, content: wrapper.firstElementChild,
        duration: 1.05, smoothWheel: true,
        easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      });
      const raf = t => { lenis.raf(t); P.requestAnimationFrame(raf); };
      P.requestAnimationFrame(raf);
      P.__wcLenis = lenis;
    }
  } catch (e) { console.warn('lenis off', e); }

  /* ---------- 2. Three.js: liquid gradient reactivo al tema ------------ */
  let setPalette = () => {};
  try {
    if (window.THREE) {
      const canvas = PD.createElement('canvas');
      canvas.id = 'wc-liquid';
      canvas.style.cssText =
        'position:fixed;inset:0;width:100vw;height:100vh;z-index:0;' +
        'pointer-events:none;';
      PD.body.prepend(canvas);
      const blobs = PD.querySelector('.bg-blobs');
      if (blobs) blobs.style.display = 'none';   // el shader lo reemplaza

      const renderer = new THREE.WebGLRenderer({canvas, antialias: false});
      renderer.setPixelRatio(Math.min(P.devicePixelRatio, 1.5));
      const scene = new THREE.Scene();
      const cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
      const uni = {
        uT:  {value: 0},
        uM:  {value: new THREE.Vector2(.5, .5)},
        uC1: {value: new THREE.Color('#e11d48')},
        uC2: {value: new THREE.Color('#4c0519')},
        uBg: {value: new THREE.Color('#070708')},
        uOp: {value: 0.5},
      };
      scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2),
        new THREE.ShaderMaterial({
          uniforms: uni,
          vertexShader: 'void main(){gl_Position=vec4(position,1.);}',
          fragmentShader: `
            uniform float uT,uOp; uniform vec2 uM;
            uniform vec3 uC1,uC2,uBg;
            void main(){
              vec2 uv = gl_FragCoord.xy / 1000.0;
              float t = uT * .12;
              vec2 m = uM - .5;
              float n = sin(uv.x*2.1+t+m.x*2.)*cos(uv.y*1.7-t*.8+m.y*2.)
                      + .5*sin(uv.x*4.3-t*1.3)*cos(uv.y*3.1+t)
                      + .25*sin((uv.x+uv.y)*5.7+t*1.7);
              n = n*.5+.5;
              vec3 c = mix(uBg, mix(uC2,uC1,smoothstep(.35,.95,n)),
                           smoothstep(.25,1.,n)*uOp);
              gl_FragColor = vec4(c,1.);
            }`,
        })));

      setPalette = () => {
        uni.uC1.value.set(cssVar('--accent', '#e11d48'));
        uni.uC2.value.set(cssVar('--blob2', '#4c0519'));
        uni.uBg.value.set(cssVar('--bg', '#070708'));
        uni.uOp.value = parseFloat(cssVar('--blob-op', '.4')) * 0.75;
      };
      setPalette();

      const resize = () => renderer.setSize(P.innerWidth, P.innerHeight, false);
      resize();
      P.addEventListener('resize', resize);
      PD.addEventListener('mousemove', e => uni.uM.value.set(
        e.clientX / P.innerWidth, 1 - e.clientY / P.innerHeight));
      const tick = t => { uni.uT.value = t / 1000;
                          renderer.render(scene, cam);
                          P.requestAnimationFrame(tick); };
      P.requestAnimationFrame(tick);
    }
  } catch (e) { console.warn('three off', e); }

  /* ---------- 3. Tema dinámico: MutationObserver sobre <head> ---------- */
  try {
    let pend = false;
    const repaint = () => { if (pend) return; pend = true;
      P.requestAnimationFrame(() => { pend = false; setPalette(); }); };
    new P.MutationObserver(repaint)
      .observe(PD.body, {childList: true, subtree: true,
                         characterData: true});
  } catch (e) {}

  /* ---------- 4. GSAP: transición SPA al cambiar de tab ---------------- */
  try {
    if (window.gsap) {
      const animateIn = () => {
        const panel = PD.querySelector('div[role="tabpanel"]:not([hidden])');
        if (panel) gsap.fromTo(panel,
          {opacity: 0, y: 14},
          {opacity: 1, y: 0, duration: .5, ease: 'power3.out',
           clearProps: 'transform'});
      };
      PD.addEventListener('click', e => {
        if (e.target.closest('[data-baseweb="tab"]')) setTimeout(animateIn, 60);
      }, true);
      animateIn();
    }
  } catch (e) { console.warn('gsap off', e); }
})();
</script>
